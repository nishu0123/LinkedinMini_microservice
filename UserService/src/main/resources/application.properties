spring.application.name=UserService

server.servlet.context-path=/user
server.port=9030

# Database Configuration (Parameterized)
spring.datasource.url=jdbc:mysql://localhost:3307/user_service_db
spring.datasource.username=${MYSQL_DB_USERNAME}
spring.datasource.password=${MYSQL_DB_PASSWORD}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# JPA Configuration
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true

# Eureka Client Discovery Config
eureka.client.service-url.defaultZone=http://localhost:8761/eureka

#token expiry time
jwt.refresh-token-expiry-days=7
jwt.access-token-expiry-minutes=15

# Parameterized JWT Secret Key (Shared with API-Gateway)
jwt.secretKey=${JWT_SECRET_KEY}
