spring.application.name=NotificationService

# disable the config server
spring.cloud.config.enabled=false
server.servlet.context-path=/Notification

## assigning port to remove the conflict due to port for the microservices
server.port=9039

## Db Configuration (Parameterized)
spring.datasource.url=jdbc:mysql://localhost:3307/notification_service_db
spring.datasource.username=${MYSQL_DB_USERNAME}
spring.datasource.password=${MYSQL_DB_PASSWORD}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

spring.jpa.show-sql=true
hibernate.transaction.jta.platform=enable

# Schema Generation Strategy
spring.jpa.hibernate.ddl-auto=update

# eureka config
eureka.client.service-url.defaultZone=http://localhost:8761/eureka
eureka.client.register-with-eureka=true
eureka.client.fetch-registry=true


# ===================================================================
# Kafka Consumer & Producer Configuration
# ===================================================================
spring.kafka.bootstrap-servers=localhost:9092

# Consumer Configuration
spring.kafka.consumer.group-id=notification-service-group
spring.kafka.consumer.key-deserializer=org.apache.kafka.common.serialization.StringDeserializer
spring.kafka.consumer.value-deserializer=org.springframework.kafka.support.serializer.ErrorHandlingDeserializer
spring.kafka.consumer.properties.spring.deserializer.value.delegate.class=org.springframework.kafka.support.serializer.JsonDeserializer
spring.kafka.consumer.properties.spring.json.trusted.packages=com.Nishant.* , com.nishant.linkedinmini.common.contracts.*,java.util,java.lang

# Producer Configuration
spring.kafka.producer.key-serializer=org.apache.kafka.common.serialization.StringSerializer
spring.kafka.producer.value-serializer=org.springframework.kafka.support.serializer.JsonSerializer
spring.kafka.producer.properties.spring.json.add.type.headers=false

# Listener Configuration
spring.kafka.listener.missing-topics-fatal=false

# ===================================================================
# Mail Configuration (Safely Parameterized)
# ===================================================================

spring.mail.host=sandbox.smtp.mailtrap.io
spring.mail.port=2525
spring.mail.username=${MAILTRAP_USERNAME}
spring.mail.password=${MAILTRAP_PASSWORD}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true


