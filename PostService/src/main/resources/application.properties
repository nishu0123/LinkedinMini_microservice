spring.application.name=PostService

# disable the config server
spring.cloud.config.enabled=false
server.servlet.context-path=/post

## assigning port to remove the conflict due to port for the microservices
server.port=9032

### Db Configuration (Parameterized)
#spring.datasource.url=jdbc:mysql://localhost:3307/post_service_db
spring.datasource.username=${MYSQL_DB_USERNAME}
spring.datasource.password=${MYSQL_DB_PASSWORD}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

spring.jpa.show-sql=true
hibernate.transaction.jta.platform=enable

# Schema Generation Strategy
spring.jpa.hibernate.ddl-auto=update

# eureka config
eureka.client.service-url.defaultZone=http://localhost:8761/eureka
eureka.client.register-with-eureka=true
eureka.client.fetch-registry=true

#configure and allow only the trusted package
spring.kafka.consumer.properties.spring.json.trusted.packages=com.Nishant.* , com.nishant.linkedinmini.common.contracts.*,java.util,java.lang

# ===================================================================
# Kafka Configuration (Fixes the ClassCastException)
# ===================================================================
spring.kafka.bootstrap-servers=localhost:9092

# Key Serializer handles the tracking message lookup keys
spring.kafka.producer.key-serializer=org.apache.kafka.common.serialization.StringSerializer

# Value Serializer forces Spring to convert your PostCreatedEventDto into JSON format
spring.kafka.producer.value-serializer=org.springframework.kafka.support.serializer.JsonSerializer


#kafka serializer configuration
JsonSerializer.ADD_TYPE_INFO_HEADERS = false
JsonDeserializer.USE_TYPE_INFO_HEADERS = false

#spring.kafka.consumer.properties.spring.json.use.type.headers=false

#debug the exception handling
#logging.level.org.springframework.web=DEBUG
#logging.level.org.springframework.validation=DEBUG
