name: LinkedIn Mini CI

on:
  push:
    branches:
      - feature/CI


jobs:
  build:
    runs-on: ubuntu-latest


steps:
 - uses: actions/checkout@v4
 - uses: actions/setup-java@v4
   with:
       distribution: temurin
       java-version: '21'
       cache: maven

 - name: Build Project
   run: mvn clean install -DskipTests
