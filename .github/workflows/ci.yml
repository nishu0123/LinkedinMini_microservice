#currently ci pipleline for the discovery-service
name: LinkedIn Mini CI

on:
  push:
    branches:
      - feature/CI

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'
          cache: maven

      - name: Build Project
        run: |
          pwd
          ls -la
          echo "Repository root contents:"
          find . -maxdepth 2 -type d

          chmod +x build-service.sh

          ./build-service.sh discovery-service docker

      - name: Build Discovery Service Docker Image
        run: |
          docker build \
            -t ${{ secrets.DOCKER_USERNAME }}/discovery-service:latest \
            -f discovery-service/Dockerfile \
            discovery-service

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_TOKEN }}


      - name: Push Docker Image
        run: |
          docker push ${{ secrets.DOCKER_USERNAME }}/discovery-service:latest
          
