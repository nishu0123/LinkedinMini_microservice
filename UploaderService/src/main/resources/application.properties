spring.application.name=UploaderService

server.servlet.context-path=/upload
server.port=9057

# disable config server if trying to add it
spring.cloud.config.enabled=false

# Cloudinary Integration (Safely Parameterized)
cloudinary.cloud-name=${CLOUDINARY_CLOUD_NAME}
cloudinary.api-key=${CLOUDINARY_API_KEY}
cloudinary.api-secret=${CLOUDINARY_API_SECRET}

# Multipart payload optimization configuration rules
spring.servlet.multipart.enabled=true
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB

# Eureka discovery configuration maps
eureka.client.service-url.defaultZone=http://localhost:8761/eureka
eureka.client.register-with-eureka=true
eureka.client.fetch-registry=true

